<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lacos Gallery</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="left-part">
        <div class="logo">LACOS</div>
        <div class="tag">A Visual Archive</div>
    </div>

    <div class="right-part">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>

        <div class="menu" id="menu">
            <div class="menu-item" onclick="adminLogin()" id="loginBtn">Login</div>
            <div class="menu-item" onclick="logout()" id="logoutBtn" style="display:none;">Logout</div>
            <label for="upload" class="menu-item admin-only" style="display:none;">Upload</label>
            <div class="menu-item admin-only" onclick="clearAll()" style="display:none;">Clear All</div>
            <div class="menu-item" onclick="showContact()">Contact</div>
        </div>
    </div>
</div>

<input type="file" id="upload" multiple hidden>

<!-- TEXT -->
<div class="text-section">
    <p class="small-title">SELECTED WORKS</p>
    <h2 class="main-title">Collection</h2>
</div>

<!-- GALLERY -->
<div class="container">
    <div class="grid" id="gallery"></div>
</div>

<script>
let images = JSON.parse(localStorage.getItem("images")) || [];
let isAdmin = false;

const gallery = document.getElementById("gallery");

// LOAD IMAGES
window.onload = function () {
    gallery.innerHTML = "";
    images.forEach(img => createCard(img.src, img.name));
};

// MENU
function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

// ADMIN LOGIN
function adminLogin() {
    let password = prompt("Enter Admin Password:");
    if (password === "lacos") {
        isAdmin = true;
        alert("Admin Mode Activated");

        document.querySelectorAll(".admin-only").forEach(el => el.style.display = "block");
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("logoutBtn").style.display = "block";

        refreshGallery();
    } else {
        alert("Wrong Password");
    }
}

// LOGOUT
function logout() {
    isAdmin = false;

    document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
    document.getElementById("loginBtn").style.display = "block";
    document.getElementById("logoutBtn").style.display = "none";

    refreshGallery();
}

// UPLOAD
document.getElementById("upload").addEventListener("change", function () {
    const files = this.files;

    for (let file of files) {
        const reader = new FileReader();

        reader.onload = function (e) {
            const imgData = {
                src: e.target.result,
                name: file.name
            };

            images.unshift(imgData);
            localStorage.setItem("images", JSON.stringify(images));

            createCard(imgData.src, imgData.name);
        };

        reader.readAsDataURL(file);
    }
});

// CREATE CARD
function createCard(src, name) {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${src}">
        <div class="overlay">
            <div class="bottom">${name}</div>
        </div>
    `;

    if (isAdmin) {
        addDeleteButton(card, src);
    }

    gallery.prepend(card);
}

// DELETE
function addDeleteButton(card, src) {
    const btn = document.createElement("button");
    btn.innerText = "✕";
    btn.style.cssText = `
        position:absolute;
        top:8px;
        right:8px;
        background:rgba(0,0,0,0.7);
        color:white;
        border:none;
        padding:4px 8px;
        cursor:pointer;
        font-size:12px;
    `;

    btn.onclick = () => {
        images = images.filter(img => img.src !== src);
        localStorage.setItem("images", JSON.stringify(images));
        card.remove();
    };

    card.appendChild(btn);
}

// REFRESH GALLERY (for login/logout)
function refreshGallery() {
    gallery.innerHTML = "";
    images.forEach(img => createCard(img.src, img.name));
}

// CLEAR ALL
function clearAll() {
    localStorage.removeItem("images");
    location.reload();
}

// CONTACT
function showContact() {
    alert("Contact: your@email.com");
}
</script>

</body>
</html>
